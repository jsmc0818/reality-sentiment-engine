name: ci

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Run model and publication tests
        run: python -m unittest discover -s tests -v
      - name: Validate committed public data
        run: python -m pipeline.public_output data/scores.json data/timeline.json
      - name: Validate website bindings
        run: node app.js
